schema_version: 1
id: separate-diagnostics-from-continuity
title: Separate diagnostics from continuity
description: >-
  When non-resumable or one-shot automation still needs debugging artifacts,
  separate diagnostic capture/upload from restore/resume behavior. Preserve
  useful debug material only through explicit modes or metadata, and ensure those
  artifacts cannot later be mistaken for resumable continuity state.
type: generic
domain: coding_workflow
applies_to:
  - implement
  - fix-pr
  - review
severity: should
weight: 7
status: active
examples:
  - source: https://github.com/self-evolving/repo/pull/268#issuecomment-4473233158
    note: >-
      The requester wanted track-only runs to upload session material for
      debugging, leading to upload-only debug bundles that keep restore/download
      disabled.
  - source: https://github.com/self-evolving/repo/pull/268#issuecomment-4473257306
    note: >-
      The requester accepted implementing the follow-up as a stacked PR after
      the plan separated upload-only debug capture from restorable continuity.
