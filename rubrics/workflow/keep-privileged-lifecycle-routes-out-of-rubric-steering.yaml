schema_version: 1
id: keep-privileged-lifecycle-routes-out-of-rubric-steering
title: Keep privileged lifecycle routes out of rubric steering
description: >-
  Do not make privileged lifecycle routes, such as installation or agent
  infrastructure update flows, eligible for normal rubric steering or rubric
  applicability unless a trusted maintainer explicitly asks for that route to be
  rubric-governed. Keep rubric routing focused on ordinary implementation,
  review, fix, answer, and rubric-management work.
type: generic
domain: coding_workflow
applies_to:
  - implement
  - fix-pr
  - review
  - rubrics-initialization
  - rubrics-update
  - rubrics-review
severity: should
weight: 8
status: active
examples:
  - source: https://github.com/self-evolving/repo/pull/369#discussion_r3329320827
    note: >-
      The requester questioned whether the privileged update route should use
      rubrics at all.
  - source: https://github.com/self-evolving/repo/pull/369#discussion_r3329321642
    note: >-
      The requester repeated that install and update-agent should not be
      included for rubrics.
