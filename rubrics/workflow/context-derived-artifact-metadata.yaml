schema_version: 1
id: context-derived-artifact-metadata
title: Generate context-derived artifact metadata
description: >-
  When agent automation creates user-facing tracking artifacts such as issues
  or needs dispatch metadata from a terse slash command or label trigger,
  synthesize structured metadata from the request plus surrounding target
  context. Do not copy the literal command tail, rely on a generic placeholder,
  or add separate ad hoc request parsers when an existing metadata contract can
  be extended with typed validated fields.
type: generic
domain: coding_workflow
applies_to:
  - implement
  - fix-pr
  - review
severity: should
weight: 7
status: active
examples:
  - source: https://github.com/self-evolving/repo/pull/232#issuecomment-4437473426
    note: >-
      The requester rejected deriving a tracking issue title from text after
      `/implement` and said the agent should generate a proper title from the
      description and context.
  - source: https://github.com/self-evolving/repo/pull/232#issuecomment-4437489955
    note: >-
      The requester endorsed the plan where `/implement` selects the route
      while Sepo synthesizes issue title metadata from the request and target
      context.
  - source: https://github.com/self-evolving/repo/issues/275#issuecomment-4485653708
    note: >-
      The maintainer corrected a deterministic stacked-PR wording parser and
      asked to use the existing implement metadata prompt/agent output to carry
      `base_pr` because that path was simpler.
