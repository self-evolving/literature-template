name: Agent / Site Preview
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, closed]
permissions: { id-token: write, contents: read, deployments: write }
jobs:
  deploy:
    concurrency:
      group: sepo-preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    # AGENT_PREVIEW_POLICY: unset/auto = public repos only, `all` = include private, `off` = disabled.
    # Within that, auto-preview every agent PR (agent/ branch prefix). Label overrides:
    # `sepo-preview` opts any PR in, `no-preview` opts an agent PR out.
    if: >-
      vars.AGENT_ENABLED != 'false' &&
      vars.AGENT_PREVIEW_POLICY != 'off' &&
      (vars.AGENT_PREVIEW_POLICY == 'all' || github.event.repository.private == false) &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.action != 'closed' &&
      (github.event.action != 'labeled' || github.event.label.name == 'sepo-preview') &&
      !contains(github.event.pull_request.labels.*.name, 'no-preview') &&
      (startsWith(github.event.pull_request.head.ref, 'agent/') || contains(github.event.pull_request.labels.*.name, 'sepo-preview'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: Build site
        run: |
          npm ci
          npm run build
      - name: Upload artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          { name: sepo-preview-site, path: ./public, retention-days: 1, if-no-files-found: error }
      - name: Deploy preview
        id: deploy
        env:
          SERVER_URL: https://preview-api.sepo.sh
          ARTIFACT_ID: ${{ steps.upload.outputs.artifact-id }}
        run: |
          set -euo pipefail
          TOK=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
                "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sepo-preview" | jq -r '.value')
          [[ "$TOK" != "null" && -n "$TOK" ]] || { echo "::error::OIDC token fetch failed"; exit 1; }
          RESP=$(curl -sS -X POST "$SERVER_URL/api/deploy/preview" -H 'Content-Type: application/json' \
                 --data "$(jq -nc --arg t "$TOK" --argjson a "$ARTIFACT_ID" '{oidc_token:$t,artifact_id:$a}')" \
                 -w '\n%{http_code}')
          CODE=$(tail -n1 <<<"$RESP"); BODY=$(sed '$d' <<<"$RESP"); echo "$BODY"
          [[ "$CODE" == 200 ]] || { echo "::error::deploy failed ($CODE)"; exit 1; }
          URL=$(jq -r .url <<<"$BODY")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "### Preview: $URL" >> "$GITHUB_STEP_SUMMARY"
      - name: Resolve Sepo agent auth
        id: auth
        if: steps.deploy.outputs.url != ''
        uses: ./.github/actions/resolve-github-auth
        with:
          app_id: ${{ secrets.AGENT_APP_ID }}
          app_private_key: ${{ secrets.AGENT_APP_PRIVATE_KEY }}
          pat: ${{ secrets.AGENT_PAT }}
          fallback_token: ${{ github.token }}
      - name: Publish deployment status
        if: steps.deploy.outputs.url != ''
        env:
          SEPO_TOKEN: ${{ steps.auth.outputs.token }}
          FALLBACK_TOKEN: ${{ github.token }}
          URL: ${{ steps.deploy.outputs.url }}
          PR: ${{ github.event.pull_request.number }}
          SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ENVIRONMENT: Preview
        run: |
          set -euo pipefail

          create_payload() {
            jq -nc \
              --arg ref "$SHA" \
              --arg environment "$ENVIRONMENT" \
              --arg description "Sepo site preview for PR #$PR" \
              --arg pr "$PR" \
              --arg head_ref "$HEAD_REF" \
              --arg head_sha "$SHA" \
              '{
                ref: $ref,
                environment: $environment,
                description: $description,
                auto_merge: false,
                required_contexts: [],
                transient_environment: true,
                production_environment: false,
                payload: {
                  source: "sepo-preview",
                  pull_request: ($pr | tonumber),
                  head_ref: $head_ref,
                  head_sha: $head_sha
                }
              }'
          }

          status_payload() {
            jq -nc \
              --arg environment "$ENVIRONMENT" \
              --arg url "$URL" \
              --arg log_url "$RUN_URL" \
              '{
                state: "success",
                environment: $environment,
                target_url: $url,
                environment_url: $url,
                log_url: $log_url,
                description: "Sepo preview is ready",
                auto_inactive: false
              }'
          }

          publish_with_token() {
            local token="$1"
            local mode="$2"
            local err
            err="$(mktemp)"

            local deployment_id
            if ! deployment_id="$(GH_TOKEN="$token" gh api --method POST "repos/$GITHUB_REPOSITORY/deployments" \
              --input - --jq '.id' 2>"$err" <<<"$(create_payload)")"; then
              echo "::warning::Failed to create GitHub deployment with $mode token: $(tr '\n' ' ' < "$err")"
              rm -f "$err"
              return 1
            fi

            if ! GH_TOKEN="$token" gh api --method POST "repos/$GITHUB_REPOSITORY/deployments/$deployment_id/statuses" \
              --input - >/dev/null 2>"$err" <<<"$(status_payload)"; then
              echo "::warning::Failed to create GitHub deployment status with $mode token: $(tr '\n' ' ' < "$err")"
              rm -f "$err"
              return 1
            fi

            rm -f "$err"
            echo "Published GitHub deployment $deployment_id for $URL using $mode token."
            return 0
          }

          if [[ -n "$SEPO_TOKEN" ]] && publish_with_token "$SEPO_TOKEN" "Sepo auth"; then
            exit 0
          fi

          if [[ -n "$FALLBACK_TOKEN" && "$FALLBACK_TOKEN" != "$SEPO_TOKEN" ]] && publish_with_token "$FALLBACK_TOKEN" "GITHUB_TOKEN"; then
            exit 0
          fi

          echo "::error::Unable to publish GitHub deployment status for $URL"
          exit 1
  teardown:
    concurrency:
      group: sepo-preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    if: >-
      vars.AGENT_ENABLED != 'false' &&
      github.event.action == 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (startsWith(github.event.pull_request.head.ref, 'agent/') || contains(github.event.pull_request.labels.*.name, 'sepo-preview'))
    runs-on: ubuntu-latest
    permissions: { id-token: write, deployments: write }
    steps:
      - name: Teardown preview
        env:
          SERVER_URL: https://preview-api.sepo.sh
        run: |
          set -euo pipefail
          TOK=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
                "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sepo-preview" | jq -r '.value')
          [[ "$TOK" != "null" && -n "$TOK" ]] || { echo "::error::OIDC token fetch failed"; exit 1; }
          RESP=$(curl -sS -X POST "$SERVER_URL/api/deploy/teardown" -H 'Content-Type: application/json' \
                 --data "$(jq -nc --arg t "$TOK" '{oidc_token:$t}')" -w '\n%{http_code}')
          CODE=$(tail -n1 <<<"$RESP"); echo "$RESP"
          [[ "$CODE" == 200 || "$CODE" == 404 ]] || { echo "::error::teardown failed ($CODE)"; exit 1; }
      - name: Mark preview deployments inactive
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          SHA: ${{ github.event.pull_request.head.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ENVIRONMENT: Preview
        run: |
          set -euo pipefail
          deployment_ids="$(
            gh api --method GET --paginate --slurp "repos/$GITHUB_REPOSITORY/deployments" \
              -f environment="$ENVIRONMENT" -f per_page=100 |
              jq -r --arg pr "$PR" --arg sha "$SHA" '
                map(.[])[] |
                select(
                  ((((.payload | objects | .source) // "") == "sepo-preview") and ((((.payload | objects | .pull_request) // "") | tostring) == $pr))
                  or ((.sha // "") == $sha)
                ) |
                .id
              '
          )"

          if [[ -z "$deployment_ids" ]]; then
            echo "No matching preview deployments to mark inactive."
            exit 0
          fi

          while IFS= read -r deployment_id; do
            [[ -n "$deployment_id" ]] || continue
            gh api --method POST "repos/$GITHUB_REPOSITORY/deployments/$deployment_id/statuses" \
              --input - >/dev/null <<EOF
          $(jq -nc --arg environment "$ENVIRONMENT" --arg log_url "$RUN_URL" '{state:"inactive", environment:$environment, log_url:$log_url, description:"Sepo preview was torn down"}')
          EOF
            echo "Marked GitHub deployment $deployment_id inactive."
          done <<< "$deployment_ids"
