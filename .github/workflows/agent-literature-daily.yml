name: Agent / Daily Literature

on:
  schedule:
    - cron: "30 11 * * *" # Daily at 7:30 AM ET / 11:30 AM UTC
  workflow_dispatch:
    inputs:
      topic:
        description: "Optional topic or interest statement. Defaults to repository goals/context."
        required: false
        default: ""
      recency_days:
        description: "How many recent days to prioritize for discovery."
        required: false
        default: "7"
      max_items:
        description: "Maximum research items to include in the update."
        required: false
        default: "8"
      include_social:
        description: "Allow tweets/threads as discovery signals when linked to primary sources."
        required: false
        default: false
        type: boolean
      discussion_category:
        description: "Discussion category for posted literature updates."
        required: false
        default: "Literature"

permissions:
  contents: read
  discussions: write
  issues: read
  pull-requests: read
  id-token: write # required for GitHub Actions OIDC broker exchange

concurrency:
  group: agent-literature-daily-${{ github.repository }}
  cancel-in-progress: false

jobs:
  pre_gate:
    if: vars.AGENT_ENABLED != 'false' && (github.event_name != 'schedule' || vars.AGENT_LITERATURE_DAILY_ENABLED == 'true')
    runs-on: ${{ fromJson(vars.AGENT_RUNS_ON || '["ubuntu-latest"]') }}
    outputs:
      skip: ${{ steps.gate.outputs.skip }}
      mode: ${{ steps.gate.outputs.mode }}
      reason: ${{ steps.gate.outputs.reason }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ github.token }}

      - name: Resolve scheduled disabled gate
        id: gate
        uses: ./.github/actions/scheduled-activity-gate
        with:
          github_token: ${{ github.token }}
          schedule_policy: ${{ vars.AGENT_SCHEDULE_POLICY || '' }}
          workflow: agent-literature-daily.yml

  daily-literature:
    needs: pre_gate
    if: vars.AGENT_ENABLED != 'false' && needs.pre_gate.outputs.skip != 'true'
    runs-on: ${{ fromJson(vars.AGENT_RUNS_ON || '["ubuntu-latest"]') }}
    environment: agent-literature
    env:
      DISCUSSION_CATEGORY: ${{ inputs.discussion_category || 'Literature' }}
      TOPIC_INPUT: ${{ inputs.topic || '' }}
      RECENCY_DAYS_INPUT: ${{ inputs.recency_days || '7' }}
      MAX_ITEMS_INPUT: ${{ inputs.max_items || '8' }}
      INCLUDE_SOCIAL_INPUT: ${{ inputs.include_social || 'false' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ github.token }}

      - name: Resolve GitHub auth
        id: auth
        uses: ./.github/actions/resolve-github-auth
        with:
          app_id: ${{ secrets.AGENT_APP_ID }}
          app_private_key: ${{ secrets.AGENT_APP_PRIVATE_KEY }}
          pat: ${{ secrets.AGENT_PAT }}
          fallback_token: ${{ github.token }}

      - name: Resolve literature discussion gate
        id: discussion_gate
        uses: ./.github/actions/discussion-post-gate
        with:
          github_token: ${{ steps.auth.outputs.token }}
          discussion_category: ${{ env.DISCUSSION_CATEGORY }}

      - name: Prepare literature run context
        if: steps.discussion_gate.outputs.skip != 'true'
        id: context
        shell: bash
        run: |
          set -euo pipefail

          trim() {
            printf '%s' "$1" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'
          }

          write_output() {
            local name="$1"
            local value="$2"
            local delim="DELIM_${RANDOM}_${RANDOM}_$$"
            {
              printf '%s<<%s\n' "$name" "$delim"
              printf '%s\n' "$value"
              printf '%s\n' "$delim"
            } >> "$GITHUB_OUTPUT"
          }

          recency_days="$(trim "${RECENCY_DAYS_INPUT:-7}")"
          max_items="$(trim "${MAX_ITEMS_INPUT:-8}")"
          include_social="$(trim "${INCLUDE_SOCIAL_INPUT:-false}" | tr '[:upper:]' '[:lower:]')"
          topic="$(trim "${TOPIC_INPUT:-}")"

          if ! [[ "$recency_days" =~ ^[0-9]+$ ]] || [ "$recency_days" -lt 1 ] || [ "$recency_days" -gt 30 ]; then
            echo "recency_days must be an integer from 1 to 30" >&2
            exit 2
          fi
          if ! [[ "$max_items" =~ ^[0-9]+$ ]] || [ "$max_items" -lt 1 ] || [ "$max_items" -gt 20 ]; then
            echo "max_items must be an integer from 1 to 20" >&2
            exit 2
          fi
          case "$include_social" in
            true|false) ;;
            *)
              echo "include_social must be true or false" >&2
              exit 2
              ;;
          esac

          write_output "summary_date" "$(date -u +%Y-%m-%d)"
          write_output "recency_days" "$recency_days"
          write_output "max_items" "$max_items"
          write_output "include_social" "$include_social"
          write_output "topic" "$topic"

      - name: Validate literature environment secrets
        if: steps.discussion_gate.outputs.skip != 'true'
        shell: bash
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
        run: |
          set -euo pipefail

          missing=()
          for name in SERPER_API_KEY S2_API_KEY JINA_API_KEY; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required agent-literature environment secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Resolve daily literature provider
        if: steps.discussion_gate.outputs.skip != 'true'
        id: provider
        uses: ./.github/actions/resolve-agent-provider
        with:
          route: daily-literature
          default_provider: ${{ vars.AGENT_DEFAULT_PROVIDER || 'auto' }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          claude_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model_policy: ${{ vars.AGENT_MODEL_POLICY || '' }}

      - name: Setup selected provider
        if: steps.discussion_gate.outputs.skip != 'true'
        uses: ./.github/actions/setup-agent-runtime
        with:
          install_codex: ${{ steps.provider.outputs.install_codex }}
          install_claude: ${{ steps.provider.outputs.install_claude }}

      - name: Setup literature research tooling
        if: steps.discussion_gate.outputs.skip != 'true'
        uses: ./.github/actions/run-skill-setup
        with:
          skill: literature-review
          trusted_ref: "true"

      - name: Resolve task timeout
        if: steps.discussion_gate.outputs.skip != 'true'
        id: task_timeout
        env:
          AGENT_TASK_TIMEOUT_POLICY: ${{ vars.AGENT_TASK_TIMEOUT_POLICY || '' }}
          ROUTE: answer
        run: node .agent/dist/cli/resolve-task-timeout.js

      - name: Generate daily literature update
        if: steps.discussion_gate.outputs.skip != 'true'
        id: literature
        timeout-minutes: ${{ fromJson(steps.task_timeout.outputs.minutes || '30') }}
        uses: ./.github/actions/run-agent-task
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
        with:
          agent: ${{ steps.provider.outputs.provider }}
          github_token: ${{ steps.auth.outputs.token }}
          secondary_github_token: ${{ secrets.AGENT_SECONDARY_GITHUB_TOKEN }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          claude_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: ${{ steps.provider.outputs.model }}
          display_model: ${{ vars.AGENT_DISPLAY_MODEL || '' }}
          permission_mode: approve-all
          prompt: literature-daily
          route: answer
          memory_mode_override: 'read-only'
          memory_ref: ${{ vars.AGENT_MEMORY_REF || 'agent/memory' }}
          memory_policy: ${{ vars.AGENT_MEMORY_POLICY || '' }}
          session_policy: none
          request_text: >-
            Generate the daily literature research update for ${{ steps.context.outputs.summary_date }}.
            Prioritize items from the last ${{ steps.context.outputs.recency_days }} days.
            Include at most ${{ steps.context.outputs.max_items }} research items.
            Social discovery signals enabled: ${{ steps.context.outputs.include_social }}.
            Optional topic: ${{ steps.context.outputs.topic || 'infer from repository context and open agent-goal issues' }}.
            Discussion category: ${{ env.DISCUSSION_CATEGORY }}.
          requested_by: ${{ github.actor }}
          source_kind: workflow_dispatch
          target_kind: repository
          target_number: '0'
          target_url: ${{ github.server_url }}/${{ github.repository }}
          reasoning_effort: medium
          workflow: agent-literature-daily.yml

      - name: Publish literature discussion and item comments
        if: steps.literature.outcome == 'success'
        env:
          BODY_FILE: ${{ steps.literature.outputs.response_file }}
          DISCUSSION_CATEGORY: ${{ env.DISCUSSION_CATEGORY }}
          DISCUSSION_FOOTER: "*Generated by the agent-literature-daily workflow*"
          DISCUSSION_TITLE: Daily Literature - ${{ steps.context.outputs.summary_date }}
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          GITHUB_TOKEN: ${{ steps.auth.outputs.token }}
        run: node .agent/dist/cli/publish-literature-update.js
