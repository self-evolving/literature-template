name: Test Scripts

on:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse workflow and action YAML
        run: |
          set -euo pipefail
          ruby -e 'require "yaml"; (Dir[".github/workflows/*.{yml,yaml}"] + Dir[".github/actions/*/action.{yml,yaml}"] + Dir[".agent/action-templates/*.{yml,yaml}"]).sort.each { |file| YAML.load_file(file) }'

      - name: Validate gh-authenticated workflow steps
        run: |
          set -euo pipefail
          ruby <<'RUBY'
          require "yaml"

          failures = []

          Dir[".github/workflows/*.{yml,yaml}"].sort.each do |file|
            workflow = YAML.load_file(file)
            jobs = workflow.fetch("jobs", {})

            jobs.each_value do |job|
              Array(job["steps"]).each do |step|
                next unless step.is_a?(Hash)

                allowed_tools = step.dig("with", "allowed_tools").to_s
                next unless allowed_tools.include?("Bash(gh *)")

                env = step["env"] || {}
                next if env.key?("GH_TOKEN")

                step_name = step["name"] || "(unnamed step)"
                failures << "#{file}: #{step_name} allows gh without GH_TOKEN"
              end
            end
          end

          abort(failures.join("\n")) unless failures.empty?
          RUBY

      - name: Shell syntax checks
        run: |
          set -euo pipefail
          failed=0
          while IFS= read -r script; do
            bash -n "$script" || failed=1
          done < <(git ls-files '*.sh')
          exit "$failed"

      - name: Diff hygiene
        run: git diff --check
