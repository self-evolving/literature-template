name: Agent / Add Paper

on:
  workflow_dispatch:
    inputs:
      paper:
        description: "Paper URL, arXiv ID, DOI, title, PDF URL, or BibTeX entry."
        required: true
        type: string
      additional_request:
        description: "Optional natural-language request, such as notes to update or connections to add."
        required: false
        default: ""
        type: string
      base_branch:
        description: "Optional base branch for the generated PR. Defaults to the repository default branch."
        required: false
        default: ""
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: read
  discussions: read
  id-token: write # required for GitHub Actions OIDC broker exchange

concurrency:
  group: agent-add-paper-${{ github.repository }}
  cancel-in-progress: false

jobs:
  add-paper:
    if: vars.AGENT_ENABLED != 'false'
    runs-on: ${{ fromJson(vars.AGENT_RUNS_ON || '["ubuntu-latest"]') }}
    environment: agent-literature
    env:
      PAPER_INPUT: ${{ inputs.paper }}
      ADDITIONAL_REQUEST_INPUT: ${{ inputs.additional_request || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ github.token }}

      - name: Resolve GitHub auth
        id: auth
        uses: ./.github/actions/resolve-github-auth
        with:
          app_id: ${{ secrets.AGENT_APP_ID }}
          app_private_key: ${{ secrets.AGENT_APP_PRIVATE_KEY }}
          pat: ${{ secrets.AGENT_PAT }}
          fallback_token: ${{ github.token }}

      - name: Validate literature environment secrets
        shell: bash
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
        run: |
          set -euo pipefail

          missing=()
          for name in SERPER_API_KEY S2_API_KEY JINA_API_KEY; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required agent-literature environment secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Resolve add-paper provider
        id: provider
        uses: ./.github/actions/resolve-agent-provider
        with:
          route: add-paper
          default_provider: ${{ vars.AGENT_DEFAULT_PROVIDER || 'auto' }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          claude_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model_policy: ${{ vars.AGENT_MODEL_POLICY || '' }}

      - name: Setup agent runtime
        uses: ./.github/actions/setup-agent-runtime
        with:
          install_codex: ${{ steps.provider.outputs.install_codex }}
          install_claude: ${{ steps.provider.outputs.install_claude }}

      - name: Resolve implementation base
        id: implementation_base
        env:
          BASE_BRANCH: ${{ inputs.base_branch }}
          BASE_PR: ""
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node .agent/dist/cli/resolve-implementation-base.js

      - name: Create add-paper branch
        env:
          BRANCH: agent/add-paper/${{ steps.provider.outputs.provider }}-${{ github.run_id }}
          GH_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail
          echo "BRANCH=${BRANCH}" >> "$GITHUB_ENV"
          AUTH_HEADER="$(node -e "process.stdout.write(Buffer.from('x-access-token:' + process.env.GH_TOKEN).toString('base64'))")"
          git -c "http.${GITHUB_SERVER_URL}/.extraheader=AUTHORIZATION: basic ${AUTH_HEADER}" fetch origin "refs/heads/${BASE_BRANCH}"
          git checkout -b "${BRANCH}" FETCH_HEAD

      - name: Setup literature research tooling
        uses: ./.github/actions/run-skill-setup
        with:
          skill: literature-review
          trusted_ref: "true"

      - name: Resolve task timeout
        id: task_timeout
        env:
          AGENT_TASK_TIMEOUT_POLICY: ${{ vars.AGENT_TASK_TIMEOUT_POLICY || '' }}
          ROUTE: implement
        run: node .agent/dist/cli/resolve-task-timeout.js

      - name: Run add-paper agent
        id: agent
        timeout-minutes: ${{ fromJson(steps.task_timeout.outputs.minutes || '30') }}
        uses: ./.github/actions/run-agent-task
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
        with:
          agent: ${{ steps.provider.outputs.provider }}
          github_token: ${{ steps.auth.outputs.token }}
          secondary_github_token: ${{ secrets.AGENT_SECONDARY_GITHUB_TOKEN }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          claude_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: ${{ steps.provider.outputs.model }}
          display_model: ${{ vars.AGENT_DISPLAY_MODEL || '' }}
          permission_mode: approve-all
          prompt: literature-add-paper
          route: implement
          memory_ref: ${{ vars.AGENT_MEMORY_REF || 'agent/memory' }}
          memory_policy: ${{ vars.AGENT_MEMORY_POLICY || '' }}
          rubrics_ref: ${{ vars.AGENT_RUBRICS_REF || 'agent/rubrics' }}
          rubrics_policy: ${{ vars.AGENT_RUBRICS_POLICY || '' }}
          rubrics_limit: ${{ vars.AGENT_RUBRICS_LIMIT || '10' }}
          session_policy: none
          request_text: |-
            Add this paper to the literature site:

            ${{ env.PAPER_INPUT }}

            Additional natural-language request:
            ${{ env.ADDITIONAL_REQUEST_INPUT }}
          requested_by: ${{ github.actor }}
          source_kind: workflow_dispatch
          target_kind: repository
          target_number: '0'
          target_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          reasoning_effort: ${{ steps.provider.outputs.reasoning_effort || 'high' }}
          workflow: agent-add-paper.yml

      - name: Verify changes
        if: always()
        id: verify
        run: node .agent/dist/cli/verify.js

      - name: Validate generated site
        if: steps.agent.outcome == 'success' && steps.verify.outputs.has_changes == 'true'
        id: site_validation
        run: |
          set -euo pipefail
          npm ci
          npm run check
          npm run build

      - name: Resolve validation result
        if: always()
        id: validation_result
        env:
          VERIFY_EXIT_CODE: ${{ steps.verify.outputs.verify_exit_code }}
          SITE_VALIDATION_OUTCOME: ${{ steps.site_validation.outcome || 'skipped' }}
        run: |
          set -euo pipefail
          verify_exit="${VERIFY_EXIT_CODE:-1}"
          site_outcome="${SITE_VALIDATION_OUTCOME:-skipped}"
          resolved="0"
          if [ "$verify_exit" != "0" ]; then
            resolved="$verify_exit"
          elif [ "$site_outcome" = "failure" ] || [ "$site_outcome" = "cancelled" ]; then
            resolved="1"
          fi
          echo "verify_exit_code=${resolved}" >> "$GITHUB_OUTPUT"

      - name: Parse response
        if: always()
        id: response
        env:
          AGENT_EXIT_CODE: ${{ steps.agent.outcome == 'success' && '0' || '1' }}
          HAS_CHANGES: ${{ steps.verify.outputs.has_changes }}
          RESPONSE_FILE: ${{ steps.agent.outputs.response_file }}
          VERIFY_EXIT_CODE: ${{ steps.validation_result.outputs.verify_exit_code }}
        run: node .agent/dist/cli/parse-response.js

      - name: Commit and push
        if: steps.response.outputs.status == 'success'
        id: commit
        env:
          BRANCH: ${{ env.BRANCH }}
          COMMIT_MESSAGE: >-
            ${{ steps.response.outputs.commit_message || 'feat: add literature paper note' }}
          GIT_BOT_EMAIL: ${{ vars.AGENT_COMMITTER_EMAIL || '' }}
          GIT_BOT_NAME: ${{ vars.AGENT_COMMITTER_NAME || '' }}
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          SET_UPSTREAM: "true"
        run: node .agent/dist/cli/commit.js

      - name: Create pull request
        if: steps.commit.outputs.committed == 'true'
        id: pr
        env:
          BASE_BRANCH: ${{ env.BASE_BRANCH }}
          BRANCH: ${{ env.BRANCH }}
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          ISSUE_NUMBER: ""
          PR_BODY: ${{ steps.response.outputs.pr_body }}
          PR_TITLE: >-
            ${{ steps.response.outputs.pr_title || 'Add literature paper note' }}
          REQUESTED_BY: ${{ github.actor }}
        run: node .agent/dist/cli/create-pr.js

      - name: Write job summary
        if: always()
        env:
          PR_URL: ${{ steps.pr.outputs.pr_url }}
          STATUS: ${{ steps.response.outputs.status || 'failed' }}
          SUMMARY: ${{ steps.response.outputs.summary }}
        run: |
          {
            echo "## Add Paper"
            echo
            echo "Status: ${STATUS}"
            if [ -n "${SUMMARY}" ]; then
              echo
              echo "${SUMMARY}"
            fi
            if [ -n "${PR_URL}" ]; then
              echo
              echo "Pull request: ${PR_URL}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
