name: Validate literature site

on:
  workflow_dispatch:

permissions:
  contents: read
  # Lets the build resolve the comment widget's repo/category IDs from names.
  discussions: read

concurrency:
  group: validate-literature-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Check Quartz site
        run: npm run check

      # Repo variables are not exported to step env automatically. Forward the
      # site-config namespaces wholesale so adding a knob never requires a
      # workflow edit again. Heredoc form keeps multi-line values intact.
      - name: Export site configuration variables
        env:
          REPO_VARS: ${{ toJSON(vars) }}
        run: |
          echo "$REPO_VARS" | jq -r 'to_entries[]
            | select(.key | test("^(GISCUS_|SEPO_|HYPOTHESIS_)"))
            | "\(.key)<<__SEPO_EOV__\n\(.value)\n__SEPO_EOV__"' >> "$GITHUB_ENV"

      # The build itself does no network lookups: this step fills in the
      # comment widget's GraphQL IDs by name when they are not pinned.
      - name: Resolve discussion IDs
        uses: ./.github/actions/resolve-discussion-ids

      - name: Build Quartz site
        run: npm run build
