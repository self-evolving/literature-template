name: Refresh Vercel deployment

on:
  workflow_dispatch:
  schedule:
    # Vercel only watches repo-docs changes. Poll by redeploying periodically so
    # source-only docs changes in self-evolving/repo are picked up without a
    # workflow in the source repository.
    - cron: "17 * * * *"

permissions:
  contents: read

jobs:
  refresh-vercel:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL is not configured; skipping refresh."
            exit 0
          fi

          curl --fail --silent --show-error --request POST "$VERCEL_DEPLOY_HOOK_URL"
          echo "Triggered Vercel deploy hook."
