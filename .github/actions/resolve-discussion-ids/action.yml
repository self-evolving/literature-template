name: Resolve discussion IDs
description: >-
  Resolve the comment widget's GISCUS_REPO_ID / GISCUS_CATEGORY_ID from the
  discussions repository and category name, and export them to the build
  environment. Pinned values (repo variables or env) win and skip the lookup;
  every failure is a warning, not an error — the build then proceeds without
  comments and quartz.ts applies the strictness policy (explicit
  GISCUS_ENABLED=true fails the build, the default is best-effort).
  Requires `discussions: read` on the workflow token. Run this after the step
  that exports GISCUS_* repo variables, before the build.
runs:
  using: composite
  steps:
    - shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        # Pinned IDs win; nothing to resolve.
        if [[ -n "${GISCUS_REPO_ID:-}" && -n "${GISCUS_CATEGORY_ID:-}" ]]; then
          echo "GISCUS_REPO_ID/GISCUS_CATEGORY_ID already set; skipping lookup."
          exit 0
        fi
        # Comments explicitly off; don't spend a request.
        case "$(tr '[:upper:]' '[:lower:]' <<<"${GISCUS_ENABLED:-}")" in
          0|false|no|off) echo "GISCUS_ENABLED is off; skipping lookup."; exit 0 ;;
        esac
        REPO="${GISCUS_REPO:-$GITHUB_REPOSITORY}"
        CATEGORY="${GISCUS_CATEGORY:-General}"
        # first: 25 is exhaustive — GitHub caps repositories at 25 discussion
        # categories, so the lookup never needs pagination.
        QUERY='query($owner: String!, $name: String!) {
          repository(owner: $owner, name: $name) {
            id
            hasDiscussionsEnabled
            discussionCategories(first: 25) { nodes { id name } }
          }
        }'
        # Bounded retry so a transient 5xx/429/network blip cannot strip a
        # build of its comments (or fail a strict GISCUS_ENABLED=true build).
        # Deterministic misses (repo not found) just burn the two retries.
        RESULT=""
        for attempt in 1 2 3; do
          if RESULT=$(timeout 30 gh api graphql -f query="$QUERY" \
              -f owner="${REPO%%/*}" -f name="${REPO#*/}" 2>&1); then
            break
          fi
          if [[ "$attempt" == 3 ]]; then
            echo "::warning::comments: could not resolve ${REPO} after ${attempt} attempts: ${RESULT}"
            exit 0
          fi
          echo "comments: lookup attempt ${attempt} failed (${RESULT}); retrying in 5s"
          sleep 5
        done
        if [[ "$(jq -r '.data.repository.hasDiscussionsEnabled' <<<"$RESULT")" != "true" ]]; then
          echo "::warning::comments: Discussions are not enabled on ${REPO}"
          exit 0
        fi
        REPO_ID=$(jq -r '.data.repository.id' <<<"$RESULT")
        CATEGORY_ID=$(jq -r --arg name "$CATEGORY" '
          [.data.repository.discussionCategories.nodes[]
            | select((.name == $name) or ((.name | ascii_downcase) == ($name | ascii_downcase)))]
          | sort_by(.name != $name) | .[0].id // empty' <<<"$RESULT")
        if [[ -z "$CATEGORY_ID" ]]; then
          AVAILABLE=$(jq -r '[.data.repository.discussionCategories.nodes[].name] | join(", ")' <<<"$RESULT")
          echo "::warning::comments: discussion category \"${CATEGORY}\" not found on ${REPO} (available: ${AVAILABLE:-none})"
          exit 0
        fi
        echo "GISCUS_REPO_ID=${REPO_ID}" >> "$GITHUB_ENV"
        echo "GISCUS_CATEGORY_ID=${CATEGORY_ID}" >> "$GITHUB_ENV"
        echo "Resolved ${REPO} -> ${REPO_ID}, \"${CATEGORY}\" -> ${CATEGORY_ID}" \
             "(pin GISCUS_REPO_ID/GISCUS_CATEGORY_ID as repo variables to skip this lookup)"
